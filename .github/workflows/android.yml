name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: V2rayNG/**/*.gradle*

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true
          link-to-sdk: true
          local-cache: true

      - name: Restore Android NDK symlinks
        run: |
          directory="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          find "$directory" -type l | while read -r link; do
            current_target="$(readlink "$link")"
            ln -sf "$directory/$(basename "$current_target")" "$link"
          done

      - name: Build tun2socks
        run: |
          bash compile-tun2socks.sh
          tar -xzf libtun2socks.so.tgz
          mkdir -p V2rayNG/app/libs
          cp -r libs/. V2rayNG/app/libs/
          find V2rayNG/app/libs -name libtun2socks.so -print
          test -f V2rayNG/app/libs/arm64-v8a/libtun2socks.so
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: AndroidLibXrayLite/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build libv2ray AAR
        working-directory: AndroidLibXrayLite
        run: |
          gomobile init
          go mod download
          mkdir -p ../V2rayNG/app/libs
          gomobile bind \
            -v \
            -androidapi 21 \
            -trimpath \
            -ldflags='-s -w -buildid= -checklinkname=0' \
            -o ../V2rayNG/app/libs/libv2ray.aar \
            ./

      - name: Make Gradle executable
        run: chmod +x V2rayNG/gradlew

      - name: Build F-Droid Universal APK
        working-directory: V2rayNG
        run: ./gradlew assembleFdroidDebug

      - name: Upload F-Droid Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: AnonymousKeys-FDroid-Universal
          path: V2rayNG/app/build/outputs/apk/fdroid/debug/*universal.apk
          if-no-files-found: error
          retention-days: 30
