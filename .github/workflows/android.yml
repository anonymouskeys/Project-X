name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: V2rayNG/**/*.gradle*

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: AndroidLibXrayLite/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build libv2ray AAR
        working-directory: AndroidLibXrayLite
        run: |
          gomobile init
          go mod download
          mkdir -p ../V2rayNG/app/libs
          gomobile bind \
            -v \
            -androidapi 24 \
            -trimpath \
            -ldflags='-s -w -buildid= -checklinkname=0' \
            -o ../V2rayNG/app/libs/libv2ray.aar \
            ./

      - name: Verify libv2ray AAR
        run: |
          test -s V2rayNG/app/libs/libv2ray.aar
          ls -lh V2rayNG/app/libs/libv2ray.aar

      - name: Make Gradle executable
        run: chmod +x V2rayNG/gradlew

      - name: Build Debug APK
        working-directory: V2rayNG
        run: ./gradlew assembleDebug
