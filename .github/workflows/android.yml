name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: V2rayNG/**/*.gradle*

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true
          link-to-sdk: true
          local-cache: true

      - name: Restore Android NDK symlinks
        run: |
          directory="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          find "$directory" -type l | while read -r link; do
            current_target="$(readlink "$link")"
            ln -sf "$directory/$(basename "$current_target")" "$link"
          done

      - name: Build tun2socks
        run: |
          bash compile-tun2socks.sh
          tar -xzf libtun2socks.so.tgz
          mkdir -p V2rayNG/app/libs
          cp -r libs/. V2rayNG/app/libs/
          find V2rayNG/app/libs -name libtun2socks.so -print
          test -f V2rayNG/app/libs/arm64-v8a/libtun2socks.so
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build ByeDPI
        run: |
          bash compile-byedpi.sh
          find V2rayNG/app/libs -name libciadpi.so -print
          test -f V2rayNG/app/libs/arm64-v8a/libciadpi.so
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: AndroidLibXrayLite/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build libv2ray AAR
        working-directory: AndroidLibXrayLite
        run: |
          gomobile init
          go mod download
          mkdir -p ../V2rayNG/app/libs
          gomobile bind \
            -v \
            -androidapi 21 \
            -trimpath \
            -ldflags='-s -w -buildid= -checklinkname=0' \
            -o ../V2rayNG/app/libs/libv2ray.aar \
            ./

      - name: Make Gradle executable
        run: chmod +x V2rayNG/gradlew

      - name: Validate Anonymous Keys signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing signing secret::$name is not configured in repository Actions secrets."
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Restore Anonymous Keys keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/anonymous_keys_release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build signed F-Droid Universal APK
        working-directory: V2rayNG
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleFdroidDebug

      - name: Verify Anonymous Keys APK signature
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          APK="V2rayNG/app/build/outputs/apk/fdroid/debug/Anonymous_keys_dpi.apk"
          test -f "$APK"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          keytool -list             -keystore "$ANDROID_KEYSTORE_PATH"             -storepass "$ANDROID_KEYSTORE_PASSWORD"             -alias "$ANDROID_KEY_ALIAS" >/dev/null

      - name: Remove temporary keystore
        if: always()
        run: rm -f "${ANDROID_KEYSTORE_PATH:-}"

      - name: Upload F-Droid Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Anonymous_keys_dpi
          path: V2rayNG/app/build/outputs/apk/fdroid/debug/Anonymous_keys_dpi.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="V2rayNG/app/build/outputs/apk/fdroid/debug/Anonymous_keys_dpi.apk"
          TAG="${GITHUB_REF_NAME}"
          TITLE="Anonymous Keys DPI ${TAG}"

          test -f "$APK"

          SHA256="$(sha256sum "$APK" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$(basename "$APK")" > "${APK}.sha256"

          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          # Anonymous Keys DPI ${TAG}

          Official Anonymous Keys DPI release.

          ## Highlights

          - Complete Anonymous Keys branding
          - Custom application signing certificate
          - Built-in ByeDPI support
          - Powered by Xray-core
          - SOCKS chaining
          - DPI bypass presets
          - JSON configuration import
          - Modern dark interface
          - GitHub and Telegram integration

          ## Download

          - `Anonymous_keys_dpi.apk`
          - `Anonymous_keys_dpi.apk.sha256`

          ## Installation note

          When upgrading from a build signed with another certificate, Android may
          require uninstalling the previous version first. Export important
          configurations before uninstalling.

          SHA-256:

          `${SHA256}`
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" "${APK}.sha256" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file "$RUNNER_TEMP/release-notes.md" --latest
          else
            gh release create "$TAG" "$APK" "${APK}.sha256"               --title "$TITLE"               --notes-file "$RUNNER_TEMP/release-notes.md"               --latest               --verify-tag
          fi
